<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        .header {
            background-color: #00000099;
            padding: .05%;
            margin-bottom: 1%;
        }

        h2 {
            color: black;
            font-style: oblique;
            padding: 1%;
            background-color: white;
            font-size: 28px;
        }

        .container {
            height: calc(100vh - 124px);
            background-image: url('data5.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: grid;
        }

        .form {
            display: grid;
            place-items: center;
        }

        form {
            display: flex;
            flex-direction: column;
            width: 480px;
            border: 1px solid #ffffff40;
            border-radius: 10px;
            background-color: #ffffff60;
        }

        h3 {
            color: white;
            margin: 10px;
            background-color: black;
            padding: 1%;
            border: none;
            border-radius: 10px;
            text-align: center;
        }
        span{
            color: red;
        }

        input,
        select,
        button {
            padding: 2%;
            margin: 2%;
            border: none;
            border-radius: 20px;
        }

        button:hover {
            cursor: pointer;
            background-color: azure;
            font-size: 15px;
        }

        .table {
            margin: 2%;
        }

        table {
            border-collapse: separate;
            width: 100%;
            background-color: azure;
        }

        th {
            background-color: black;
            color: white;
        }

        tr:hover {
            background-color: black;
            color: azure;
        }
    </style>
</head>

<body>
    <div class="header">
        <h2>-fallout_resort</h2>
    </div>
    <div class="container">
        <div class="form">
            <form>
                <h3>-booking_details--</h3>
                 <span id="span"></span>
                <input type="text" placeholder="First_Name" id="fname">
                <input type="text" placeholder="Middle_Name" id="mname">
                <input type="text" placeholder="Last_Name" id="lname">
                <input type="number" placeholder="ID_NO" id="idnum">
                <select id="rtype">
                    <option value="" hidden>--Room_Type--</option>
                    <option value="Standard">Standard</option>
                    <option value="Deluxe">Deluxe</option>
                    <option value="Executive">Executive</option>
                </select>
                <select id="rservice">
                    <option value="" hidden>--Room_Service--</option>
                    <option value="YES">YES</option>
                    <option value="NO">NO</option>
                </select>
               
                <button type="submit" id="submit">Reserve Room</button>
            </form>
        </div>
        <div class="table">
            <table id="myTable">
                <tr>
                    <th>Name</th>
                    <th>ID_NO</th>
                    <th>Room_Type</th>
                    <th>Room_Service</th>
                </tr>
            </table>
        </div>
    </div>
</body>
<script>
    window.addEventListener('load', loaddata);

    function loaddata() {

        const data = JSON.parse(localStorage.getItem('details')) || [];

        const mytable = document.getElementById('myTable');

        data.forEach(guest => {
            mytable.insertAdjacentHTML('beforeend', `<tr><td>${guest.name}</td><td>${guest.idnum}</td><td>${guest.rtype}</td><td>${guest.rservice}</td></tr>`);
        });

    };

    const btnreserve = document.getElementById('submit');
    btnreserve.addEventListener('click', savedata);

    function savedata() {
        event.preventDefault();
        const fname = document.getElementById('fname').value;
        const mname = document.getElementById('mname').value;
        const lname = document.getElementById('lname').value;
        const idnum = document.getElementById('idnum').value;
        const rtype = document.getElementById('rtype').value;
        const rservice = document.getElementById('rservice').value;
        const name = fname + ' ' + mname + ' ' + lname;
        const span = document.getElementById('span');

        if (fname && lname && idnum && rtype && rservice != '') {
            const newDetails = addDetails(
                name,
                idnum,
                rtype,
                rservice
            );

        }
        else {
            span.innerText = 'Empty Field(s)!';
        }
    };
    const details = JSON.parse(localStorage.getItem('details')) || [];

    const addDetails = (name, idnum, rtype, rservice) => {
        details.push({
            name,
            idnum,
            rtype,
            rservice
        });
        localStorage.setItem('details', JSON.stringify(details));
        location.href = 'index.html';
        return { name, idnum, rtype, rservice };
    };
</script>

</html>
